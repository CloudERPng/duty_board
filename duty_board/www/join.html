<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join · Xlevel Client Portal</title>
<link rel="icon" href="/assets/duty_board/mobile/icon-192.png">
<meta name="theme-color" content="#0F5C55">
<style>
	body { margin: 0; font-family: system-ui, sans-serif; background: #0F5C55; color: #fff;
		display: flex; min-height: 100vh; align-items: center; justify-content: center; }
	.card { background: #fff; color: #111; border-radius: 16px; padding: 28px; width: 92%; max-width: 420px; }
	h2 { margin: 0 0 4px; color: #0F5C55; }
	p { margin: 4px 0 16px; color: #6b7280; font-size: 14px; }
	input { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 10px;
		padding: 11px 13px; font-size: 16px; margin-bottom: 10px; font-family: inherit; }
	button { width: 100%; background: #0F5C55; color: #fff; border: none; border-radius: 10px;
		padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
	#msg { margin-top: 12px; font-size: 14px; display: none; }
	#msg.ok { color: #15803d; } #msg.err { color: #b91c1c; }
</style>
</head>
<body>
<div class="card">
	<h2>Join your Xlevel room</h2>
	<p>Tell us who you are — your Xlevel team will approve access shortly.</p>
	<input id="name" placeholder="Full name" maxlength="100">
	<input id="email" placeholder="Work email" maxlength="120" type="email">
	<input id="phone" placeholder="Phone (optional)" maxlength="30">
	<input id="pw" placeholder="Choose a password (min 8 characters)" maxlength="60" type="password">
	<button onclick="go()">Request access</button>
	<div id="msg"></div>
</div>
<script>
function show(t, ok) {
	const m = document.getElementById("msg");
	m.textContent = t; m.className = ok ? "ok" : "err"; m.style.display = "block";
}
function go() {
	const token = new URLSearchParams(location.search).get("token") || "";
	const name = document.getElementById("name").value.trim();
	const email = document.getElementById("email").value.trim();
	const phone = document.getElementById("phone").value.trim();
	const pw = document.getElementById("pw").value;
	if (!name || !email) return show("Name and email are required.", false);
	if (pw && pw.length < 8) return show("Password must be at least 8 characters.", false);
	fetch("/api/method/duty_board.client_room.submit_join_request", {
		method: "POST",
		headers: { "Content-Type": "application/json" },
		body: JSON.stringify({ token: token, full_name: name, email: email, phone: phone, password: pw }),
	})
		.then(async (r) => {
			const j = await r.json();
			if (!r.ok) throw new Error((j._server_messages && JSON.parse(JSON.parse(j._server_messages)[0]).message) || "Request failed");
			const d = j.message || {};
			if (d.already) show("You already have access — check your email for your login, or go to /portal.", true);
			else if (d.pending) show("Your request is already awaiting approval — hang tight.", true);
			else {
				show(pw ? "Request sent ✔ Once approved, log in with your email and password." : "Request sent ✔ You'll receive a welcome email once approved.", true);
				setTimeout(() => (location.href = "/login?redirect-to=/portal"), 2500);
			}
			document.querySelector("button").disabled = true;
		})
		.catch((e) => show(e.message, false));
}
</script>
</body>
</html>
